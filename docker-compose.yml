services:
  backend:
    build: .
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - DEFAULT_LLM_PROVIDER=${DEFAULT_LLM_PROVIDER:-deepseek}
      - TRANSLATION_LLM_PROVIDER=${TRANSLATION_LLM_PROVIDER:-openai}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-opus-4-6}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3.1-pro-preview}
      - QWEN_MODEL=${QWEN_MODEL:-qwen-plus}
      - DEFAULT_RESPONSE_TYPE=${DEFAULT_RESPONSE_TYPE:-general}
      - DEFAULT_TEMPERATURE=${DEFAULT_TEMPERATURE:-0.7}
      - MAX_TOKENS=${MAX_TOKENS:-4000}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - MAX_WORKERS=${MAX_WORKERS:-4}
      - MAX_HISTORY_TURNS=${MAX_HISTORY_TURNS:-20}
      - ALLOW_USER_API_KEYS=${ALLOW_USER_API_KEYS:-true}
      - AUTH_TOKEN=${AUTH_TOKEN:-}
      - SESSION_TTL_SECONDS=${SESSION_TTL_SECONDS:-3600}
      - MAX_SESSIONS_PER_IP_PER_HOUR=${MAX_SESSIONS_PER_IP_PER_HOUR:-0}
      - DAILY_MESSAGE_QUOTA_PER_IP=${DAILY_MESSAGE_QUOTA_PER_IP:-0}
      - MAX_WS_CONNECTIONS=${MAX_WS_CONNECTIONS:-200}
      - MAX_WS_CONNECTIONS_PER_IP=${MAX_WS_CONNECTIONS_PER_IP:-5}
      - WS_RATE_LIMIT_PER_SEC=${WS_RATE_LIMIT_PER_SEC:-5}
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - PUBLIC_URL=/
    expose:
      - "80"
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./nginx/nginx-local.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
